version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: leadgrowth-db
    restart: always
    environment:
      MYSQL_DATABASE: leadgrowth
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: leadgrowth-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DATABASE_HOST=db
      - DATABASE_USER=root
      - DATABASE_PASSWORD=root
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: leadgrowth-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
