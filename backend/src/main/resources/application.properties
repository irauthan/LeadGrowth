server.port=8080

# Database Configuration (Docker Compose friendly)
spring.datasource.url=jdbc:mysql://${DATABASE_HOST:localhost}:3306/leadgrowth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Custom Application settings
leadgrowth.jwt.secret=9a72e811c7d242637a28e3b1c6d3f2349e52c87123d4c67ba567c823ef567df1
leadgrowth.jwt.expiration-ms=86400000

# File Upload sizes (optional profile pic)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
